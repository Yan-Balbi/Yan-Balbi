<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" style="background: #000; width: 100%; height: auto; border-radius: 8px;">
  <defs>
    <!-- Gradiente para as linhas sumirem no horizonte -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="1"/>
    </linearGradient>
    <!-- Filtro de Brilho Neon -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="100%" height="100%" fill="#000000"/>

  <!-- GRID TRON COMPLETO -->
  <g stroke="url(#gridFade )" stroke-width="1.5" filter="url(#neonGlow)">
    
    <!-- Linhas de Perspectiva (Verticais que abrem em leque) -->
    <line x1="400" y1="140" x2="400" y2="300" />
    <line x1="400" y1="140" x2="200" y2="300" />
    <line x1="400" y1="140" x2="0" y2="300" />
    <line x1="400" y1="140" x2="-200" y2="300" />
    <line x1="400" y1="140" x2="600" y2="300" />
    <line x1="400" y1="140" x2="800" y2="300" />
    <line x1="400" y1="140" x2="1000" y2="300" />

    <!-- Linhas Horizontais (Atravessando de ponta a ponta) -->
    <line x1="-200" y1="155" x2="1000" y2="155" stroke-opacity="0.3" />
    <line x1="-200" y1="175" x2="1000" y2="175" stroke-opacity="0.5" />
    <line x1="-200" y1="205" x2="1000" y2="205" stroke-opacity="0.7" />
    <line x1="-200" y1="245" x2="1000" y2="245" stroke-opacity="0.9" />
    <line x1="-200" y1="295" x2="1000" y2="295" stroke-opacity="1.0" />
  </g>

  <!-- Nome Centralizado -->
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="60" fill="#ffffff" style="filter: drop-shadow(0 0 8px #00ffff); letter-spacing: 8px;">
    YAN BALBI
  </text>
  
  <!-- Status do Sistema -->
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ffff" style="letter-spacing: 3px; opacity: 0.8;">
    <!-- > INITIALIZING YAN.JAR... -->
  </text>
  
</svg>
