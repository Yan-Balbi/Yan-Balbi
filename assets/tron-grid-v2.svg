<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="300" fill="black" />
  
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="1" />
      <stop offset="100%" stop-color="black" stop-opacity="0" />
    </linearGradient>
    <mask id="mask">
      <rect width="1000" height="300" fill="url(#fade)" />
    </mask>
  </defs>

  <g mask="url(#mask)">
    <!-- Linhas de Perspectiva (Estáticas) -->
    <g stroke="#00ffff" stroke-width="1" stroke-opacity="0.6">
      <line x1="500" y1="0" x2="500" y2="300" />
      <line x1="500" y1="0" x2="300" y2="300" />
      <line x1="500" y1="0" x2="100" y2="300" />
      <line x1="500" y1="0" x2="-100" y2="300" />
      <line x1="500" y1="0" x2="-300" y2="300" />
      <line x1="500" y1="0" x2="700" y2="300" />
      <line x1="500" y1="0" x2="900" y2="300" />
      <line x1="500" y1="0" x2="1100" y2="300" />
      <line x1="500" y1="0" x2="1300" y2="300" />
    </g>

    <!-- Linhas Horizontais Animadas -->
    <g stroke="#00ffff" stroke-width="1" stroke-opacity="0.6">
      <animateTransform attributeName="transform" type="translate" from="0 -40" to="0 0" dur="2s" repeatCount="indefinite" />
      <line x1="-500" y1="40" x2="1500" y2="40" />
      <line x1="-500" y1="80" x2="1500" y2="80" />
      <line x1="-500" y1="120" x2="1500" y2="120" />
      <line x1="-500" y1="160" x2="1500" y2="160" />
      <line x1="-500" y1="200" x2="1500" y2="200" />
      <line x1="-500" y1="240" x2="1500" y2="240" />
      <line x1="-500" y1="280" x2="1500" y2="280" />
      <line x1="-500" y1="320" x2="1500" y2="320" />
    </g>
  </g>
</svg>
